name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-linux:
    name: Build + test (Linux x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Install JUCE Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libgl1-mesa-dev libwebkit2gtk-4.1-dev \
            ladspa-sdk

      - name: Install flox
        uses: flox/install-flox-action@v2
        with:
          version: "1.11.2"

      - name: Build all Linux targets
        # Force JUCE's CMake to use the system pkg-config and look at the
        # apt-installed .pc files under /usr/lib/x86_64-linux-gnu/pkgconfig.
        # Otherwise flox's pkg-config gets picked up and doesn't see
        # freetype2 / fontconfig / x11 / gtk+-3.0 from apt → JUCE compiles
        # juceaide with no -I flags for those, and ft2build.h fails.
        env:
          PKG_CONFIG: /usr/bin/pkg-config
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: flox activate -- task build-linux

      - name: Run tests (unit + integration + render_baseline; VRT is macOS-only)
        env:
          PKG_CONFIG: /usr/bin/pkg-config
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: flox activate -- task test-linux

      - name: Upload unsigned VST3 (build artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DoomViz-vst3-linux-${{ github.sha }}
          path: build-linux/DoomViz_artefacts/VST3/DoomViz.vst3
          retention-days: 30

  build:
    name: Build + render baseline (macOS arm64)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Install flox
        uses: flox/install-flox-action@v2
        with:
          version: "1.11.2"

      - name: Build VST3 (unsigned)
        run: flox activate -- task build-mac-unsigned

      - name: Render baseline test
        run: flox activate -- task test

      - name: Visual regression
        run: flox activate -- task vrt

      - name: Upload unsigned VST3
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DoomViz-vst3-${{ github.sha }}
          path: build/DoomViz_artefacts/VST3/DoomViz.vst3
          retention-days: 30

      # Always upload — when baselines are absent (bootstrap state) the
      # maintainer downloads this artifact, copies its PPMs into
      # test/vrt/baselines/, and commits. After that every run does a
      # byte-exact diff and the artifact serves as the diff record on
      # any failure.
      - name: Upload VRT output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-output-${{ github.sha }}
          path: test/vrt/output/
          retention-days: 30

  # Tag-triggered release: signs + notarizes + staples + attaches the VST3
  # to a GitHub Release. Gated on `refs/tags/v*` so only deliberate tags
  # like `v0.2.0` trigger this — pushes to main only run the build job.
  release:
    name: Sign + notarize + publish (tagged release)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: macos-14
    timeout-minutes: 60
    # Required for softprops/action-gh-release to create the Release. The
    # default GITHUB_TOKEN is read-only for `contents`, which means it can
    # check out the repo but cannot publish a release; without this, the
    # final step gets 403 "Resource not accessible by integration".
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Install flox
        uses: flox/install-flox-action@v2
        with:
          version: "1.11.2"

      - name: Import Developer ID signing certificate
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 -d > /tmp/cert.p12
          security create-keychain -p ci ci.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p ci ci.keychain
          security set-keychain-settings -t 3600 -l ci.keychain
          security import /tmp/cert.p12 -k ci.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci ci.keychain
          rm /tmp/cert.p12
          security find-identity -v -p codesigning

      - name: Build, sign, notarize, staple
        env:
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
          AC_API_KEY_ID:        ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID:     ${{ secrets.AC_API_ISSUER_ID }}
        run: |
          echo "$AC_API_KEY_P8_BASE64" | base64 -d > /tmp/key.p8
          flox activate -- task notarize-mac-ci
          rm -f /tmp/key.p8

      - name: Package signed VST3 for release
        run: |
          cd dist
          ditto -c -k --keepParent DoomViz.vst3 DoomViz-${{ github.ref_name }}.vst3.zip

      - name: Create GitHub Release with VST3
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DoomViz-${{ github.ref_name }}.vst3.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Cleanup signing keychain
        if: always()
        run: security delete-keychain ci.keychain || true

  # Tag-triggered Linux release: builds the Linux VST3 and attaches it to the
  # same GitHub Release as the macOS bundle. No signing analog on Linux.
  release-linux:
    name: Publish (Linux x86_64 tagged release)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-linux
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Install JUCE Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libjack-jackd2-dev \
            libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libgl1-mesa-dev libwebkit2gtk-4.1-dev \
            ladspa-sdk

      - name: Install flox
        uses: flox/install-flox-action@v2
        with:
          version: "1.11.2"

      - name: Build Linux VST3
        env:
          PKG_CONFIG: /usr/bin/pkg-config
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: flox activate -- task build-linux

      - name: Package VST3 for release
        run: |
          cd build-linux/DoomViz_artefacts/VST3
          tar czf "$RUNNER_TEMP/DoomViz-${{ github.ref_name }}-linux-x86_64.tar.gz" DoomViz.vst3

      - name: Attach Linux artifact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ runner.temp }}/DoomViz-${{ github.ref_name }}-linux-x86_64.tar.gz
          fail_on_unmatched_files: true
