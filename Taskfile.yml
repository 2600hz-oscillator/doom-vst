version: '3'

vars:
  BUILD_DIR: build
  DIST_DIR: dist
  VST3_NAME: DoomViz.vst3
  # Developer ID identity used by the macOS codesign step. Override per-host
  # by exporting SIGNING_IDENTITY in your shell. Leave as the dash to ad-hoc
  # sign on machines that don't have a Developer ID cert installed; ad-hoc
  # signing is enough to load locally but is rejected by Gatekeeper / cannot
  # be notarized.
  SIGNING_IDENTITY: '{{.SIGNING_IDENTITY | default "Developer ID Application: Tristan Mayshark (PHY35R5456)"}}'
  # Keychain profile name created by `xcrun notarytool store-credentials`.
  NOTARY_PROFILE: '{{.NOTARY_PROFILE | default "doomviz-notary"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  configure:
    desc: Run cmake configure (auto-picks compiler per OS)
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - |
        if [ "$(uname)" = "Darwin" ]; then
          cd {{.BUILD_DIR}} && cmake .. \
            -DCMAKE_C_COMPILER=/usr/bin/clang \
            -DCMAKE_CXX_COMPILER=/usr/bin/clang++
        else
          cd {{.BUILD_DIR}} && cmake .. -G Ninja
        fi
    sources:
      - CMakeLists.txt
      - extern/JUCE/CMakeLists.txt
    generates:
      - "{{.BUILD_DIR}}/CMakeCache.txt"

  build:
    desc: Build the VST3 for the current platform (macOS or Linux)
    deps: [configure]
    cmds:
      - |
        if [ "$(uname)" = "Darwin" ]; then
          task: build-mac
        else
          task: build-linux
        fi

  build-mac:
    desc: Build the macOS VST3 (requires Xcode Command Line Tools on host)
    deps: [configure]
    preconditions:
      - sh: "[ \"$(uname)\" = \"Darwin\" ]"
        msg: "build-mac only runs on macOS"
      - sh: "test -x /usr/bin/clang"
        msg: "Apple Clang not found. Install: xcode-select --install"
    cmds:
      - cmake --build {{.BUILD_DIR}} -j1 --target DoomViz_VST3
      - mkdir -p {{.DIST_DIR}}
      - rm -rf {{.DIST_DIR}}/{{.VST3_NAME}}
      - cp -R {{.BUILD_DIR}}/DoomViz_artefacts/VST3/{{.VST3_NAME}} {{.DIST_DIR}}/
      # Strip iCloud / quarantine / fileprovider xattrs that get inherited
      # when the source tree lives under ~/Documents (iCloud-synced). Bitwig
      # and other hosts will silently skip plugins with these xattrs.
      - xattr -cr {{.DIST_DIR}}/{{.VST3_NAME}}
      # Remove iCloud cloud-conflict files (e.g. "DoomViz 2", "DoomViz 3")
      # that codesign rejects as unrecognized subcomponents.
      - find {{.DIST_DIR}}/{{.VST3_NAME}} \( -name '* [0-9]' -o -name '* [0-9][0-9]' \) -print0 | xargs -0 -I{} rm -rf "{}"
      - codesign --force --deep --options runtime --timestamp --sign "{{.SIGNING_IDENTITY}}" {{.DIST_DIR}}/{{.VST3_NAME}}
      - echo "Built {{.DIST_DIR}}/{{.VST3_NAME}}"

  build-mac-unsigned:
    desc: Build the macOS VST3 without code-signing (CI / local dev without a Developer ID cert). Doesn't write to dist/.
    deps: [configure]
    preconditions:
      - sh: "[ \"$(uname)\" = \"Darwin\" ]"
        msg: "build-mac-unsigned only runs on macOS"
      - sh: "test -x /usr/bin/clang"
        msg: "Apple Clang not found. Install: xcode-select --install"
    cmds:
      - cmake --build {{.BUILD_DIR}} -j$(sysctl -n hw.ncpu) --target DoomViz_VST3
      - echo "Built (unsigned) {{.BUILD_DIR}}/DoomViz_artefacts/VST3/{{.VST3_NAME}}"
      - echo "(dist/ untouched — used by 'task build-mac' as the local install staging dir)"

  build-linux:
    desc: Build all Linux targets (VST3 + tests). Runs natively on Linux, else prints flox-containerize instructions. Doesn't write to dist/ (that's the macOS local install staging dir).
    cmds:
      - |
        if [ "$(uname)" = "Linux" ]; then
          mkdir -p {{.BUILD_DIR}}-linux
          # Force system /usr/bin/c++ for the same reason build-mac forces
          # /usr/bin/clang: flox's c++ from the dev env doesn't see apt-
          # installed JUCE deps under /usr/include (X11, freetype, GTK).
          cd {{.BUILD_DIR}}-linux
          cmake .. -G Ninja \
            -DCMAKE_C_COMPILER=/usr/bin/cc \
            -DCMAKE_CXX_COMPILER=/usr/bin/c++
          cmake --build . -j$(nproc) --target DoomViz_VST3 doomviz_unit_tests doomviz_integration_tests render_test
          cd ..
          echo "Built {{.BUILD_DIR}}-linux/DoomViz_artefacts/VST3/{{.VST3_NAME}}"
          echo "(dist/ untouched — that's the macOS local install staging dir)"
        else
          echo "Cross-platform Linux builds use 'flox containerize' + container runtime."
          echo "To build a Linux VST3 from macOS:"
          echo "  flox containerize | docker load"
          echo "  docker run --rm -v \$(pwd):/work -w /work doom-viz task build-linux"
          exit 1
        fi

  build-win:
    desc: Build all Windows targets (VST3 + tests). Runs natively on a Windows host with Visual Studio 2022 (via Git Bash). On other hosts, prints CI / Windows-host instructions. Doesn't write to dist/.
    cmds:
      - |
        case "$(uname -s 2>/dev/null || echo Windows)" in
          MINGW*|MSYS*|CYGWIN*|Windows*)
            mkdir -p {{.BUILD_DIR}}-win
            cd {{.BUILD_DIR}}-win
            # VS 2022 generator + x64 architecture. cmake auto-discovers the
            # MSBuild toolchain installed by Visual Studio Build Tools.
            cmake .. -G "Visual Studio 17 2022" -A x64
            cmake --build . --config Release --parallel \
              --target DoomViz_VST3 doomviz_unit_tests doomviz_integration_tests render_test
            cd ..
            echo "Built {{.BUILD_DIR}}-win/DoomViz_artefacts/Release/VST3/{{.VST3_NAME}}"
            echo "(dist/ untouched — that's the macOS local install staging dir)"
            ;;
          *)
            echo "Cross-platform Windows builds aren't supported from this host."
            echo "To build a Windows VST3:"
            echo "  - Run 'task build-win' on a Windows host with Visual Studio 2022 + Git Bash, OR"
            echo "  - Push to a branch and let the CI 'build-windows' job produce the artifact."
            exit 1
            ;;
        esac

  test-win:
    desc: Run unit + integration + render_baseline tests against the build-win directory (Windows only — VRT is macOS-pinned, same as Linux)
    deps: [build-win]
    cmds:
      - |
        case "$(uname -s 2>/dev/null || echo Windows)" in
          MINGW*|MSYS*|CYGWIN*|Windows*)
            cd {{.BUILD_DIR}}-win && ctest -C Release -L 'unit|integration' --output-on-failure
            ;;
          *) echo "test-win only runs on Windows"; exit 1 ;;
        esac

  install-win:
    desc: Install the Windows VST3 to %CommonProgramFiles%\VST3\ (typically C:\Program Files\Common Files\VST3\)
    deps: [build-win]
    cmds:
      - |
        case "$(uname -s 2>/dev/null || echo Windows)" in
          MINGW*|MSYS*|CYGWIN*|Windows*)
            DEST="${CommonProgramFiles:-/c/Program Files/Common Files}/VST3"
            mkdir -p "$DEST"
            rm -rf "$DEST/{{.VST3_NAME}}"
            cp -R {{.BUILD_DIR}}-win/DoomViz_artefacts/Release/VST3/{{.VST3_NAME}} "$DEST/"
            echo "Installed to $DEST/{{.VST3_NAME}}"
            ;;
          *) echo "install-win only runs on Windows"; exit 1 ;;
        esac

  test-linux:
    desc: Run unit + integration + render_baseline tests against the build-linux directory (Linux only — VRT is macOS-only since baselines are platform-pinned)
    deps: [build-linux]
    preconditions:
      - sh: '[ "$(uname)" = "Linux" ]'
        msg: "test-linux only runs on Linux"
    cmds:
      - cd {{.BUILD_DIR}}-linux && ctest --output-on-failure

  install-mac:
    desc: Install the macOS VST3 to ~/Library/Audio/Plug-Ins/VST3/
    deps: [build-mac]
    preconditions:
      - sh: "[ \"$(uname)\" = \"Darwin\" ]"
        msg: "install-mac only runs on macOS"
    cmds:
      - rm -rf ~/Library/Audio/Plug-Ins/VST3/{{.VST3_NAME}}
      - cp -R {{.DIST_DIR}}/{{.VST3_NAME}} ~/Library/Audio/Plug-Ins/VST3/
      # cp -R re-attaches the iCloud / fileprovider xattrs from the source
      # tree, so strip them again at the install destination before signing.
      - xattr -cr ~/Library/Audio/Plug-Ins/VST3/{{.VST3_NAME}}
      - find ~/Library/Audio/Plug-Ins/VST3/{{.VST3_NAME}} \( -name '* [0-9]' -o -name '* [0-9][0-9]' \) -print0 | xargs -0 -I{} rm -rf "{}"
      - codesign --force --deep --options runtime --timestamp --sign "{{.SIGNING_IDENTITY}}" ~/Library/Audio/Plug-Ins/VST3/{{.VST3_NAME}}
      - echo "Installed to ~/Library/Audio/Plug-Ins/VST3/{{.VST3_NAME}}"

  notarize-mac-ci:
    desc: Sign + notarize + staple via App Store Connect API key (CI release path).
    deps: [build-mac]
    preconditions:
      - sh: "[ \"$(uname)\" = \"Darwin\" ]"
        msg: "notarize-mac-ci only runs on macOS"
      - sh: '[ -n "${AC_API_KEY_ID}" ]'
        msg: "AC_API_KEY_ID env var not set"
      - sh: '[ -n "${AC_API_ISSUER_ID}" ]'
        msg: "AC_API_ISSUER_ID env var not set"
      - sh: 'test -f /tmp/key.p8'
        msg: "/tmp/key.p8 not present (decode AC_API_KEY_P8_BASE64 secret into it before running)"
    cmds:
      - rm -f /tmp/DoomViz_notarize.zip
      - ditto -c -k --keepParent {{.DIST_DIR}}/{{.VST3_NAME}} /tmp/DoomViz_notarize.zip
      - xcrun notarytool submit /tmp/DoomViz_notarize.zip --key /tmp/key.p8 --key-id "${AC_API_KEY_ID}" --issuer "${AC_API_ISSUER_ID}" --wait
      - xcrun stapler staple {{.DIST_DIR}}/{{.VST3_NAME}}
      - xcrun stapler validate {{.DIST_DIR}}/{{.VST3_NAME}}
      - rm -f /tmp/DoomViz_notarize.zip
      - echo "Notarized + stapled {{.DIST_DIR}}/{{.VST3_NAME}} (CI path)"

  notarize-mac:
    desc: Sign + notarize + staple the dist VST3 (release builds)
    deps: [build-mac]
    preconditions:
      - sh: "[ \"$(uname)\" = \"Darwin\" ]"
        msg: "notarize-mac only runs on macOS"
      - sh: "xcrun notarytool history --keychain-profile {{.NOTARY_PROFILE}} >/dev/null 2>&1"
        msg: "notarytool keychain profile '{{.NOTARY_PROFILE}}' not set up. Run: xcrun notarytool store-credentials {{.NOTARY_PROFILE}} --apple-id <id> --team-id <team> --password <app-specific-pw>"
    cmds:
      # notarytool wants a single archive, not a bundle directly.
      - rm -f /tmp/DoomViz_notarize.zip
      - ditto -c -k --keepParent {{.DIST_DIR}}/{{.VST3_NAME}} /tmp/DoomViz_notarize.zip
      - xcrun notarytool submit /tmp/DoomViz_notarize.zip --keychain-profile {{.NOTARY_PROFILE}} --wait
      - xcrun stapler staple {{.DIST_DIR}}/{{.VST3_NAME}}
      - xcrun stapler validate {{.DIST_DIR}}/{{.VST3_NAME}}
      - rm -f /tmp/DoomViz_notarize.zip
      - echo "Notarized + stapled {{.DIST_DIR}}/{{.VST3_NAME}}"

  test:
    desc: Build + run all tests (unit + integration + render baseline)
    deps: [configure]
    cmds:
      - cmake --build {{.BUILD_DIR}} -j$(sysctl -n hw.ncpu) --target render_test doomviz_unit_tests doomviz_integration_tests
      - cd {{.BUILD_DIR}} && ctest --output-on-failure

  test-unit:
    desc: Build + run only the Catch2 unit tests
    deps: [configure]
    cmds:
      - cmake --build {{.BUILD_DIR}} -j$(sysctl -n hw.ncpu) --target doomviz_unit_tests
      - cd {{.BUILD_DIR}} && ctest -L unit --output-on-failure

  test-integration:
    desc: Build + run only the integration tests (real DoomVizProcessor + render baseline)
    deps: [configure]
    cmds:
      - cmake --build {{.BUILD_DIR}} -j$(sysctl -n hw.ncpu) --target doomviz_integration_tests render_test
      - cd {{.BUILD_DIR}} && ctest -L integration --output-on-failure

  vrt:
    desc: Build + run the visual regression suite (compares against test/vrt/baselines/)
    deps: [configure]
    cmds:
      - cmake --build {{.BUILD_DIR}} -j$(sysctl -n hw.ncpu) --target doomviz_vrt_runner
      - rm -rf test/vrt/output
      - mkdir -p test/vrt/output
      - python3 test/vrt/run_vrt.py
          --runner {{.BUILD_DIR}}/doomviz_vrt_runner_artefacts/doomviz_vrt_runner
          --wad resources/DOOM1.WAD
          --audio-dir test/vrt/audio
          --baseline-dir test/vrt/baselines
          --output-dir test/vrt/output
          --repo-root .

  vrt-update-baselines:
    desc: Run the VRT runner and copy its output into test/vrt/baselines/ (use to bootstrap or refresh)
    deps: [configure]
    cmds:
      - cmake --build {{.BUILD_DIR}} -j$(sysctl -n hw.ncpu) --target doomviz_vrt_runner
      - rm -rf test/vrt/output
      - mkdir -p test/vrt/output
      - python3 test/vrt/run_vrt.py
          --runner {{.BUILD_DIR}}/doomviz_vrt_runner_artefacts/doomviz_vrt_runner
          --wad resources/DOOM1.WAD
          --audio-dir test/vrt/audio
          --baseline-dir test/vrt/baselines
          --output-dir test/vrt/output
          --repo-root . || true
      - mkdir -p test/vrt/baselines
      - rsync -a --delete --include='*/' --include='frame_*.ppm' --exclude='*' test/vrt/output/ test/vrt/baselines/
      - echo "Baselines refreshed under test/vrt/baselines/. Inspect, then commit."

  clean:
    desc: Remove build artifacts (keeps dist/)
    cmds:
      - rm -rf {{.BUILD_DIR}} {{.BUILD_DIR}}-linux

  clean-all:
    desc: Remove build and dist artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}} {{.BUILD_DIR}}-linux {{.DIST_DIR}}
